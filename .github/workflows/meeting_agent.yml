name: AI Meeting Assistant Agent

on:
  workflow_dispatch:

  schedule:
    - cron: "0 15 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recreate secret files
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}" > .env
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json
          mkdir -p outputs

      - name: Generate notes
        run: python src/generate_notes.py

      - name: Generate email
        run: python src/generate_email.py

      - name: Generate agent decision
        run: python src/agent_decision.py

      - name: Send team summary email
        run: python src/send_email.py

      - name: Run reminder agent
        run: python src/send_reminders.py