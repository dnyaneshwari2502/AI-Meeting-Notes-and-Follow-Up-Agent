name: AI Meeting Assistant Agent

on:
  workflow_dispatch:

  schedule:
    # Daily reminder check at 9 AM Denver time during MDT = 15:00 UTC
    - cron: "0 15 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recreate secret files
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}" > .env
          echo '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run reminder agent
        run: python src/send_reminders.py