name: AI Meeting Assistant Agent

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 9 AM Denver time during MDT
    - cron: "0 15 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Recreate required files
        run: |
          mkdir -p outputs
          printf '%s' '${{ secrets.GMAIL_CREDENTIALS_JSON }}' > credentials.json
          printf '%s' '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Generate notes
        run: python src/generate_notes.py

      - name: Generate email
        run: python src/generate_email.py

      - name: Generate agent decision
        run: python src/agent_decision.py

      - name: Send team summary email
        run: python src/send_email.py

      - name: Run reminder agent
        run: python src/send_reminders.py